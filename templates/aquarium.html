<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイ水族館 - 石川さかな巡り</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    /* 水槽の背景画像 */
    .tank-bg {
      background-image: url('/static/images/wallpaper/{{ wallpaper_file|default("ver1.png") }}');
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }
  </style>
</head>

<body class="bg-blue-50 min-h-screen flex flex-col items-center p-4 font-sans text-gray-800">

  <header class="w-full max-w-md bg-white/80 backdrop-blur rounded-2xl shadow-sm p-4 mb-4 flex justify-between items-center sticky top-4 z-40">
    <h1 class="text-lg font-bold text-blue-600 flex items-center">
      <span class="mr-2 text-2xl">🌊</span>マイ水族館
    </h1>

    <div class="text-right flex flex-col items-end gap-1">
      <p class="text-xs font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
        {{ stage_name|default('ステージ1') }}
      </p>

      <!-- ★ 押しやすいステージUI：前後ボタン + ドロップダウン -->
      <div class="flex items-center gap-2">

        <!-- 前のステージ -->
        <a
          href="{% if (stage_id|default(1)) <= 1 %}#{% elif (stage_id|default(1)) - 1 == 1 %}/aquarium{% else %}/aquarium/stage/{{ (stage_id|default(1)) - 1 }}{% endif %}"
          class="px-3 py-1 rounded-full bg-gray-100 text-gray-700 select-none
                 {% if (stage_id|default(1)) <= 1 %}opacity-40 pointer-events-none{% endif %}"
          aria-label="前のステージ"
        >◀</a>

        <!-- ステージ選択 -->
        <label class="sr-only" for="stage-select">ステージ選択</label>
        <select
          id="stage-select"
          class="text-xs font-bold bg-gray-100 text-gray-700 rounded-full px-3 py-1 border border-gray-200
                 focus:outline-none focus:ring-2 focus:ring-cyan-400"
        >
          {% for i in range(1, (stage_max|default(7)) + 1) %}
            <option value="{{ i }}" {% if (stage_id|default(1)) == i %}selected{% endif %}>
              ステージ{{ i }}
            </option>
          {% endfor %}
        </select>

        <!-- 次のステージ -->
        <a
          href="{% if (stage_id|default(1)) >= (stage_max|default(7)) %}#{% else %}/aquarium/stage/{{ (stage_id|default(1)) + 1 }}{% endif %}"
          class="px-3 py-1 rounded-full bg-gray-100 text-gray-700 select-none
                 {% if (stage_id|default(1)) >= (stage_max|default(7)) %}opacity-40 pointer-events-none{% endif %}"
          aria-label="次のステージ"
        >▶</a>

      </div>
    </div>
  </header>

  <main class="w-full max-w-md bg-white rounded-[2.5rem] shadow-xl overflow-hidden p-2 mb-24 relative flex-grow flex flex-col border border-gray-100 h-[70vh]">

    <div class="relative w-full h-full rounded-[2rem] overflow-hidden tank-bg shadow-inner">

      <!-- 背景ロゴ（不要ならコメントアウト） -->
      <!--
      <div class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none z-0">
        <h2 class="text-4xl font-black text-white leading-tight text-center tracking-widest">
          ISHIKAWA<br>AQUARIUM
        </h2>
      </div>
      -->

      <!-- 光レイヤー（光線は削除済み） -->
      <div class="aquarium-light-layer absolute inset-0 pointer-events-none z-[2]">
        <div class="surface-shimmer"></div>
        <div class="surface-reflection"></div>
        <div id="caustics" class="caustics"></div>
        <div id="light-particle-container" class="light-particle-container"></div>
      </div>

      <!-- 水槽（横スクロール） -->
      <div class="relative w-full h-full overflow-x-auto overflow-y-hidden no-scrollbar" style="touch-action: pan-x;">
        <div id="fish-tank" class="relative h-full z-10 min-w-[140%] md:min-w-[120%]" style="width: max(140%, 900px);">

          <!-- ★ 泡：遠景（魚の後ろ） -->
          <div id="bubble-container" class="absolute inset-0 pointer-events-none z-0"></div>

          <!-- ★ 泡：前景（魚の手前） -->
          <div id="bubble-container-fg" class="absolute inset-0 pointer-events-none z-30"></div>

          <!-- ★ 水中フォグ（奥行きの霞） -->
          <div id="water-fog" class="absolute inset-0 pointer-events-none z-20"></div>

          <!-- 魚DOMは aquarium.js がここに追加 -->
        </div>
      </div>

      <!-- 吹き出し -->
      <div id="talk-bubble" class="absolute bottom-8 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur px-6 py-3 rounded-2xl shadow-lg hidden z-50 transition-all transform scale-95 border-2 border-blue-100 max-w-[80%] text-center">
        <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-white rotate-45 border-b-2 border-r-2 border-blue-100"></div>
        <p id="fish-message" class="text-blue-900 font-bold text-sm leading-relaxed"></p>
      </div>

    </div>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur border-t border-gray-100 px-6 py-3 flex justify-around items-center z-50 max-w-md mx-auto rounded-t-2xl shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
    <a href="/" class="flex flex-col items-center text-gray-400 hover:text-cyan-600 transition-colors">
      <span class="text-2xl">🎲</span><span class="text-[10px] font-bold">すごろく</span>
    </a>
    <a href="/encyclopedia" class="flex flex-col items-center text-gray-400 hover:text-cyan-600 transition-colors">
      <span class="text-2xl">📕</span><span class="text-[10px] font-bold">図鑑</span>
    </a>
    <a href="/aquarium" class="flex flex-col items-center text-cyan-600">
      <span class="text-2xl">🌊</span><span class="text-[10px] font-bold">水族館</span>
    </a>
    <a href="/logout" class="flex flex-col items-center text-gray-400 hover:text-red-500 transition-colors">
      <span class="text-2xl">🚪</span><span class="text-[10px] font-bold">ログアウト</span>
    </a>
  </nav>

  <script src="{{ url_for('static', filename='js/aquarium.js') }}"></script>

  <!-- ★ ステージ選択：変更時に遷移 -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const select = document.getElementById("stage-select");
      if (!select) return;

      select.addEventListener("change", () => {
        const stage = parseInt(select.value, 10);
        if (stage === 1) {
          window.location.href = "/aquarium";
        } else {
          window.location.href = "/aquarium/stage/" + stage;
        }
      });
    });
  </script>

</body>
</html>
